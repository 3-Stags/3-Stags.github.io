baseURL = "https://3-stags.com"

# Change the default theme to be use when building the site with Hugo
theme = "LoveIt"

# website title
title = "3 Stags LLC"

defaultContentLanguage = "en"

[languages]
  [languages.en]
    locale = "en-US"
    label = "English"

# Menu config
[menu]
#  [[menu.main]]
#    weight = 1
#    identifier = "posts"
